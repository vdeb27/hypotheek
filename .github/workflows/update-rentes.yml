name: Update rentetarieven

on:
  schedule:
    - cron: '0 6 * * 1'  # Elke maandag 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Haal actuele rentetarieven op
        run: npm run update-rentes
        working-directory: app
      - name: Commit bijgewerkte tarieven
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/src/providers/data/rates-cache.json
          git diff --staged --quiet || git commit -m "chore: update rentetarieven $(date -u +%Y-%m-%d)"
      - name: Push naar main
        run: git push
